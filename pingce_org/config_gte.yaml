# GTE multilingual-base multi-mode benchmark on MSA eval set
#
# Usage:
#   ./run_eval_gte.sh
#   ./run_eval.sh --config config_gte.yaml --models gte_multilingual_base
#   ./run_eval_gte.sh --no-cache

embedding:
  device: "cuda"
  batch_size: 64

eval:
  input_json: "../results/full_run/cluster_retrieval_intent_eval_msa_full.json"
  device: "cuda:0"
  batch_size: 64
  report_dir: "./output/reports"
  report_file: "intent_retrieval_eval_msa_gte.json"
  cache_dir: "./output/reports/score_cache_gte"

  models:
    gte_multilingual_base:
      path: "/new_nfs/models/gte-multilingual-base"
      backend: gte
      use_fp16: true
      max_length: 8192
      hybrid_dense_weight: 1.0
      hybrid_sparse_weight: 0.3
      modes: [dense, sparse, hybrid]
