# Regex patterns (full string match, case-insensitive) -> copy verbatim
pattern_skip:
  # Pure placeholder tokens like XX / XXX / 0XXX (no translation needed)
  - '^[0-9]*X{2,}[0-9]*$'
  # Masked/redacted spans
  - '^\*+$'
  # Bracketed system tokens like [Email]
  - '^\[[^\]]+\](?:\s+[A-Z]{1,4}\s+\[[^\]]+\](?:\s+[A-Z]{1,4})?)?$'
