# Cluster-avg retrieval benchmark on MSA eval set + qa_msa.json
#
# 10 models: 8 local dense + GTE dense + Qwen3-4B (FAQ instruct)
# Usage:
#   ./run_eval_cluster_msa_4gpu.sh
#   ./run_eval_cluster_msa_4gpu.sh --no-cache

embedding:
  device: "cuda"
  batch_size: 64

eval:
  input_json: "../results/full_run/cluster_retrieval_intent_eval_msa_full.json"
  device: "cuda:0"
  batch_size: 64
  report_dir: "./output/reports"

  cluster:
    qa_json: "./qa_msa.json"
    report_file: "intent_retrieval_cluster_eval_msa.json"
    cache_dir: "./output/reports/score_cache_cluster_msa"

  models:
    bge_m3:
      path: "/data1/hcc/jiansuo/model/bge-m3"
      backend: dense
      use_fp16: true
      modes: [dense]

    arabic_english_bge_m3:
      path: "/data1/hcc/jiansuo/model/arabic-english-bge-m3"
      backend: dense
      use_fp16: true
      modes: [dense]

    multilingual_e5_large_instruct:
      path: "/data1/hcc/jiansuo/model/multilingual-e5-large-instruct"
      backend: dense
      use_fp16: true
      query_style: e5_instruct
      task_description: "Given a user question in Modern Standard Arabic, retrieve the matching FAQ question"
      modes: [dense]

    snowflake_arctic_l_v2:
      path: "/data1/hcc/jiansuo/model/snowflake-arctic-embed-l-v2.0"
      backend: dense
      use_fp16: true
      query_style: snowflake_prefix
      modes: [dense]

    gate_arabert_v1:
      path: "/data1/hcc/jiansuo/model/GATE-AraBert-v1"
      backend: dense
      use_fp16: true
      modes: [dense]

    arabic_triplet_matryoshka_v2:
      path: "/data1/hcc/jiansuo/model/Arabic-Triplet-Matryoshka-V2"
      backend: dense
      use_fp16: true
      modes: [dense]

    qwen3_embedding_0_6b:
      path: "/data1/hcc/jiansuo/model/Qwen3-Embedding-0.6B"
      backend: dense
      use_fp16: true
      query_style: qwen3_prompt
      modes: [dense]

    embeddinggemma_300m:
      path: "/data1/hcc/jiansuo/model/embeddinggemma-300m"
      backend: dense
      use_fp16: false
      query_style: gemma_retrieval
      gemma_task: "search result"
      modes: [dense]

    gte_multilingual_base:
      path: "/new_nfs/models/gte-multilingual-base"
      backend: gte
      use_fp16: true
      max_length: 8192
      modes: [dense]

    qwen3_embedding_4b:
      path: "/new_nfs/models/Qwen__Qwen3-Embedding-4B"
      backend: dense
      use_fp16: true
      query_style: qwen3_custom
      task_description: >-
        Given a user question in Modern Standard Arabic about BCA banking
        customer-service FAQs, retrieve the FAQ question with the same user
        intent. Pay special attention to product names, banking entities, and
        action polarity such as block vs unblock, activate vs deactivate,
        PIN vs password vs OTP.
      modes: [dense]

  gpu_plan:
    - gpu: 4
      models: [bge_m3, arabic_english_bge_m3, gte_multilingual_base]
    - gpu: 5
      models: [multilingual_e5_large_instruct, snowflake_arctic_l_v2]
    - gpu: 6
      models: [gate_arabert_v1, arabic_triplet_matryoshka_v2, embeddinggemma_300m]
    - gpu: 7
      models: [qwen3_embedding_0_6b, qwen3_embedding_4b]
